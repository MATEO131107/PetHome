<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Comidas</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<h1>🍽️ Comidas</h1>
<p>Organiza la alimentación de tu mascota</p>
</header>

<main class="container">

<img src="comidas.png" alt="Comida para mascotas" class="imagen-seccion" onclick="agrandarImagen(this)">

<h2>Control de alimentación diaria 🐾</h2>

<input type="number" id="num1" placeholder="Comida en la mañana (gramos)"><br><br>
<input type="number" id="num2" placeholder="Comida en la tarde (gramos)"><br><br>
<input type="number" id="num3" placeholder="Comida en la noche (gramos)"><br><br>

<button onclick="sumarDatos()">Total de comida</button>
<button onclick="promedioDatos()">Promedio por comida</button>

<p id="resultado"></p>

<h2>Horario de comidas</h2>

<ul>
<li>🌅 Desayuno - 8:00 AM</li>
<li>🌞 Almuerzo - 1:00 PM</li>
<li>🌙 Cena - 7:00 PM</li>
</ul>

<h2>Recomendaciones</h2>

<p>Recuerda darle comida balanceada según su edad y tamaño.</p>

<a href="index.html">⬅ Volver al inicio</a>

</main>

 <script src="script.js"></script>
</body>
</html>
